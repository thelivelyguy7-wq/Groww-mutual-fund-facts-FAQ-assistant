name: Daily RAG Ingestion Pipeline

on:
  schedule:
    # 9:15 AM IST is 3:45 AM UTC
    - cron: '45 3 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  run-ingestion:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Install Playwright Browsers
        run: playwright install --with-deps chromium
        
      - name: Run Scraper
        run: python src/scraper.py
        
      - name: Run Cleaner
        run: python src/cleaner.py
        
      - name: Run Indexer (ChromaDB)
        run: python src/indexer.py
        
      - name: Commit and Push Updated Database
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git commit -m "chore(data): auto-update chroma db and raw data at 9:15 AM IST" || echo "No changes to commit"
          git push
